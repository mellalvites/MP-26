<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Locator</title>
  </head>
  <!-- Load Calcite Design System -->
  <script
    type="module"
    src="https://js.arcgis.com/calcite-components/3.3.3/calcite.esm.js"></script>

  <!-- Load the JavaScript Maps SDK core API -->
  <script src="https://js.arcgis.com/4.34/"></script>

  <!-- Load the JavaScript Maps SDK Map components or other component packages -->
  <script
    type="module"
    src="https://js.arcgis.com/4.34/map-components/"></script>

  <script type="module" src="main.js" defer></script>

  <style>
    html,
    body {
      height: 100%;
      margin: 0;
    }
  </style>
  <body>
    <arcgis-map basemap="topo-vector">
      <arcgis-search slot="top-right" include-default-sources-disabled></arcgis-search>
    </arcgis-map>
  </body>
</html>
